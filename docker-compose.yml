services:
  babel:
    build: .
    container_name: babel
    ports:
      - "8787:8787"
    volumes:
      - ~/.babel/config.yaml:/root/.babel/config.yaml
    environment:
      - BABEL_CONFIG=/root/.babel/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8787"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
