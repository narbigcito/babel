version: '3.8'

services:
  babel:
    build: .
    container_name: babel
    ports:
      - "8787:8787"
    volumes:
      - ./data/config.yaml:/root/.babel/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
